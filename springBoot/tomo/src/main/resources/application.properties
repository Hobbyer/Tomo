spring.application.name=tomo

server.port=8080

# Database configuration
spring.datasource.url=jdbc:mysql://localhost:3307/tomo?useSSL=false&serverTimezone=UTC
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Logging configuration
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG

# JWT \uC124\uC815
jwt.secret=${JWT_SECRET_KEY}
# JWT \uC561\uC138\uC2A4 \uD1A0\uD070 \uB9CC\uB8CC \uC2DC\uAC04 \uC124\uC815 (3600000 ms = 1 hour)
jwt.expiration.access=3600000
# JWT \uB9AC\uD504\uB808\uC2DC \uD1A0\uD070 \uB9CC\uB8CC \uC2DC\uAC04 \uC124\uC815 (604800000 ms = 7 days)
jwt.expiration.refresh=604800000

# Google OAuth2 \uC124\uC815
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
# Google OAuth2 Redirect URI
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google
spring.security.oauth2.client.registration.google.scope=profile,email

